<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops in js</title>
</head>
<body>
    <script>
//loops are used to execute a block of code repeatedly until a specified condition is met.

  //for loops:
  let studentList=["vinay","vikas","abhi","megha","vivek","deepak"];
  
  
  for(let i=0;i<studentList.length;i++){
    console.log(studentList[i]);

  }
 //while loop........
  let x=0;
 while(x<studentList.length){
 console.log(studentList[x]);
 x++;
 }

 //for......of: iterates over the values of iterable objects (like array, strings, maps, and sets).

 for(let y of studentList){
    console.log(y);
 }
    </script>

</body>
</html>
