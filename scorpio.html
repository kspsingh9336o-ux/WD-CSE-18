<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hand Tracking Scorpio</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0.3;
  }

  #scorpio {
    position: absolute;
    font-size: 180px;
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="scorpio">🦂</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("video");
const scorpio = document.getElementById("scorpio");

const hands = new Hands({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults((results) => {
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {

    const finger = results.multiHandLandmarks[0][8]; // index finger tip

    let x = finger.x * window.innerWidth;
    let y = finger.y * window.innerHeight;

    scorpio.style.left = (x - 90) + "px";
    scorpio.style.top  = (y - 90) + "px";
  }
});

const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
  },
  width: 640,
  height: 480
});

camera.start();
</script>

</body>
</html>
